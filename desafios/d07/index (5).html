<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Imagem Flexível</title>
</head>
<body>
    <h1>Imagem flexível</h1>
    <p>Você está vendo a imagem completa? Experimente ampliar o tamanho da sua janela para aproveitar melhor a experiência &#x1F92F;</p>

    <picture>
        <source media="(max-width: 1320px)" srcset="imagens/foto-c.png" type="image/png">
        <source media="(max-width: 1620px)" srcset="imagens/foto-b.png" type="image/png">
        <img src="imagens/foto-a.png" alt="Imagem">
    </picture>
    
</body>
</html>
